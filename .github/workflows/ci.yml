name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true 

      - name: Sync dependencies
        run: uv sync

      - name: Run ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q